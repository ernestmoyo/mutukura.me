[[redirects]]
  from = "http://mutukura.me/*"
    to = "https://mutukura.me/:splat"
      status = 301
        force = true

        [[redirects]]
          from = "http://www.mutukura.me/*"
            to = "https://mutukura.me/:splat"
              status = 301
                force = true

                [[headers]]
                  for = "/*"
                    [headers.values]
                        Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
